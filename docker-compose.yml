version: "3.9"

services:

  # ─────────────────────────────────────────
  #  BASE DE DATOS — MySQL 8
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: gestion_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE:      gestion_productos
      MYSQL_USER:          gestion_user
      MYSQL_PASSWORD:      gestion_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d   
    networks:
      - gestion_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5
# ─────────────────────────────────────────
  #  API — FastAPI - Uvicorn
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestion_api
    restart: unless-stopped
    environment:
      DB_HOST:      db
      DB_PORT:      3306
      DB_NAME:      gestion_productos
      DB_USER:      gestion_user
      DB_PASSWORD:  gestion_pass
      PYTHONPATH:   /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gestion_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

# ─────────────────────────────────────────
#  VOLÚMENES Y RED
# ─────────────────────────────────────────
volumes:
  mysql_data:

networks:
  gestion_net:
    driver: bridge